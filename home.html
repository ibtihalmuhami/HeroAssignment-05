<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- daisyui + Tailwind -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <!-- stylesheet -->
       <link rel="stylesheet" href="style/style.css">

</head>
<body>
    <!-- navbar -->
    <header >
        <div class="flex justify-between items-center px-10 py-3 ">

        
            <div class="logo flex items-center gap-2">
                <img src="/assets/github-logo.png" alt="">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
                
            </div>
            <div class="nav-right flex items-center gap-1">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass translate-x-8"></i>
                    <input type="text" name="" id="" class="pl-7 " placeholder="Search Issues...">
    
                </div>
                <button class="new-issue-btn text-white w-auto bg-blue-700">+ New Issue</button>
    
            </div>
        </div>
    </header>

    <!-- main part -->
     <section class="min-h-screen w-[80%] bg-base-200 mx-auto border mt-5 border-red-500 ">
        <!--three buttons part -->

        <div class="pl-7 border rounded-b-[10px] my-2 p-6 border-b border-t border-gray-300 shadow-md">
            <button  id="all-filtered-btn" class=" bg-blue-700 text-white mt-4">All </button>
            <button  id="open-filtered-btn" class=" bg-white text-black mt-4">Open </button>
            <button  id="closed-filtered-btn" class=" bg-white text-black mt-4">Closed </button>

        </div>

        <!-- middle part -->
         <div class="flex items-center justify-between p-6  border rounded-b-[10px] my-2  border-b border-t border-gray-300 shadow-md">
            <div class=" flex ">
                <img src="./assets/Aperture.png" alt="">
                <h2 class="font-bold"> 50 Issues</h2>
                
                <p class="text-gray-400 -translate-x-17 pt-5">Track and Manage Your Project Issues</p>


                
            </div>
            <div class="flex items-center gap-2">
                <p class="w-3 h-3   bg-green-500 rounded-full" ></p>
                <p>open</p>
                <p class="w-3 h-3   bg-purple-500 rounded-full"></p>
                <p>closed</p>
            </div>
         </div>

         <!-- card part -->
          <div>
            <div id="card-container" class="grid grid-cols-1 gap-4 p-6  border rounded-b-[10px]  border-b border-t border-gray-300 shadow-md">
                <!-- issue cards will be dynamically added here --to be implemented in home.js -->
                 hiii

            </div>

          </div>



     </section>



<!-- javascript -->

<script src="script/home.js"></script>




</body>
</html>
